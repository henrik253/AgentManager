# Explicit-only Agent Manager configuration.

[server]
host = "127.0.0.1"
port = 8765
websocket_path = "/v1/session"

[workspace]
worktree_root = ".agent-manager/worktrees"
branch_prefix = "agent-task/"
allow_existing_worktree = false

[routing]
mode = "explicit"
preferred_backends = []
allow_fallback = false

[[backends]]
id = "claude"
display_name = "Claude CLI"
command = "claude"
enabled = true

[[backends]]
id = "codex"
display_name = "Codex"
command = "codex"
enabled = true

[[backends]]
id = "gemini"
display_name = "Gemini CLI"
command = "gemini"
enabled = true
